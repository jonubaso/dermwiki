<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DermWiki — Acesso</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --surface: #ffffff;
      --ink: #1a1a1a;
      --ink-muted: #6b6560;
      --accent: #2d5a4e;
      --accent-light: #e8f0ee;
      --accent-hover: #234840;
      --border: #e2ddd8;
      --error: #b94040;
      --error-bg: #fdf2f2;
      --success: #2d5a4e;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 80%, rgba(45,90,78,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(45,90,78,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
    }

    /* Logo */
    .brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 14px;
      margin-bottom: 1rem;
    }

    .brand-mark svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: white;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .brand p {
      margin-top: 0.4rem;
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 4px 40px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      background: var(--bg);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 2rem;
    }

    .tab {
      flex: 1;
      padding: 0.55rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--ink-muted);
      background: transparent;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'DM Sans', sans-serif;
    }

    .tab.active {
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    /* Form */
    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.45rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,90,78,0.1);
      background: #fff;
    }

    input::placeholder {
      color: #c0bab4;
    }

    /* Message */
    .message {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1.1rem;
      line-height: 1.4;
    }

    .message.error {
      display: block;
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid rgba(185,64,64,0.2);
    }

    .message.success {
      display: block;
      background: var(--accent-light);
      color: var(--success);
      border: 1px solid rgba(45,90,78,0.2);
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 0.85rem;
      font-size: 0.9rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
      letter-spacing: 0.02em;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.99); }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .card-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--ink-muted);
    }

    .card-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .card-footer a:hover { text-decoration: underline; }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.25rem 0;
      color: var(--border);
      font-size: 0.75rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Page footer */
    .page-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.72rem;
      color: var(--ink-muted);
      opacity: 0.7;
    }

    /* Fade in */
    .card {
      animation: fadeUp 0.5s ease both;
    }

    .brand {
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M8 12h8M12 8v8"/>
      </svg>
    </div>
    <h1>DermWiki</h1>
    <p>Comunidade Médica · Dermatologia</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Entrar</button>
      <button class="tab" onclick="switchTab('signup')">Registar</button>
    </div>

    <div id="msg" class="message"></div>

    <!-- Login -->
    <div id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="email@hospital.pt" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn" id="btn-login" onclick="handleLogin()">Entrar</button>
      <div class="divider">ou</div>
      <div style="text-align:center; font-size:0.82rem; color:var(--ink-muted)">
        Ainda não tens conta? <a href="#" onclick="switchTab('signup')">Regista-te</a>
      </div>
    </div>

    <!-- Signup -->
    <div id="form-signup" style="display:none">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" id="signup-name" placeholder="Dr. João Silva" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label>Especialidade</label>
        <input type="text" id="signup-especialidade" placeholder="ex: Dermatologia" autocomplete="off"/>
      </div>
      <div class="form-group">
        <label>Hospital / Instituição</label>
        <input type="text" id="signup-hospital" placeholder="ex: Centro Hospitalar e Universitário de Coimbra" autocomplete="organization"/>
      </div>
      <div class="form-group">
        <label>Email profissional</label>
        <input type="email" id="signup-email" placeholder="email@hospital.pt" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Mínimo 8 caracteres" autocomplete="new-password"/>
      </div>
      <button class="btn" id="btn-signup" onclick="handleSignup()">Criar conta</button>
      <div class="divider">ou</div>
      <div style="text-align:center; font-size:0.82rem; color:var(--ink-muted)">
        Já tens conta? <a href="#" onclick="switchTab('login')">Entra aqui</a>
      </div>
    </div>
  </div>

  <div class="page-footer">
    Plataforma reservada a profissionais de saúde<br>
    Para problemas técnicos contactar <a href="mailto:jonubaso@gmail.com" style="color:var(--accent);">jonubaso@gmail.com</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://mpqzatqcadeiwjvzydyh.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_AGlH3J91hKGXpeM-YNns9w_6xzMOry2';
  const NOTION_URL   = 'https://dermwiki.notion.site/?v=1ec579234891818e8138000ca11a24ab';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  function switchTab(tab) {
    document.getElementById('form-login').style.display  = tab === 'login'  ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
    });
    clearMsg();
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'message ' + type;
  }

  function clearMsg() {
    const el = document.getElementById('msg');
    el.className = 'message';
    el.textContent = '';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="btn-spinner"></span>A processar...'
      : (btnId === 'btn-login' ? 'Entrar' : 'Criar conta');
  }

  async function handleLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showMsg('Preenche todos os campos.', 'error');

    setLoading('btn-login', true);
    clearMsg();

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      setLoading('btn-login', false);
      return showMsg('Email ou password incorretos. Tenta novamente.', 'error');
    }

    // Check approval status
    const { data: profile } = await sb
      .from('profiles')
      .select('approved')
      .eq('user_id', data.user.id)
      .single();

    setLoading('btn-login', false);

    if (!profile || !profile.approved) {
      await sb.auth.signOut();
      showMsg('O teu registo está a aguardar aprovação. Receberás um email quando for ativado.', 'error');
    } else {
      showMsg('Login efetuado! A redirecionar...', 'success');
      setTimeout(() => window.location.href = NOTION_URL, 800);
    }
  }

  async function handleSignup() {
    const name          = document.getElementById('signup-name').value.trim();
    const especialidade = document.getElementById('signup-especialidade').value.trim();
    const hospital      = document.getElementById('signup-hospital').value.trim();
    const email         = document.getElementById('signup-email').value.trim();
    const password      = document.getElementById('signup-password').value;

    if (!name || !especialidade || !hospital || !email || !password)
      return showMsg('Preenche todos os campos.', 'error');
    if (password.length < 8)
      return showMsg('A password deve ter pelo menos 8 caracteres.', 'error');

    setLoading('btn-signup', true);
    clearMsg();

    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: { data: { full_name: name, especialidade, hospital } }
    });

    if (!error && data.user) {
      await sb.from('profiles').insert({
        user_id: data.user.id,
        full_name: name,
        especialidade,
        hospital,
        email,
        approved: false
      });
    }

    setLoading('btn-signup', false);

    if (error) {
      showMsg('Erro ao criar conta: ' + error.message, 'error');
    } else {
      showMsg('Registo submetido! A tua conta será ativada em breve pelo administrador.', 'success');
    }
  }

  // Enter key support
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const loginVisible = document.getElementById('form-login').style.display !== 'none';
    if (loginVisible) handleLogin();
    else handleSignup();
  });

  // Check if already logged in
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = NOTION_URL;
  });
</script>
</body>
</html>
