<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DermWiki — Acesso</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f5f2; --surface: #ffffff; --ink: #1a1a1a; --ink-muted: #6b6560;
      --accent: #2d5a4e; --accent-light: #e8f0ee; --accent-hover: #234840;
      --border: #e2ddd8; --error: #b94040; --error-bg: #fdf2f2; --success: #2d5a4e;
    }
    body {
      font-family: 'DM Sans', sans-serif; background-color: var(--bg);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: radial-gradient(circle at 20% 80%, rgba(45,90,78,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(45,90,78,0.04) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .wrapper { position: relative; z-index: 1; width: 100%; max-width: 380px; }
    .brand { text-align: center; margin-bottom: 2.5rem; animation: fadeUp 0.4s ease both; }
    .brand-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 52px; height: 52px; background: var(--accent); border-radius: 14px; margin-bottom: 1rem;
    }
    .brand-mark svg { width: 28px; height: 28px; fill: none; stroke: white; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .brand h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; color: var(--ink); letter-spacing: -0.02em; line-height: 1; }
    .brand p { margin-top: 0.4rem; font-size: 0.8rem; font-weight: 300; color: var(--ink-muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 2.5rem; box-shadow: 0 4px 40px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      animation: fadeUp 0.5s ease both;
    }
    .card-title { font-size: 0.85rem; color: var(--ink-muted); margin-bottom: 1.5rem; text-align: center; }
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.45rem; }
    input {
      width: 100%; padding: 0.75rem 1rem; font-size: 0.95rem; font-family: 'DM Sans', sans-serif;
      color: var(--ink); background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,90,78,0.1); background: #fff; }
    input::placeholder { color: #c0bab4; }
    .message { display: none; padding: 0.75rem 1rem; border-radius: 10px; font-size: 0.85rem; margin-bottom: 1.1rem; line-height: 1.4; }
    .message.error { display: block; background: var(--error-bg); color: var(--error); border: 1px solid rgba(185,64,64,0.2); }
    .message.success { display: block; background: var(--accent-light); color: var(--success); border: 1px solid rgba(45,90,78,0.2); }
    .btn {
      width: 100%; padding: 0.85rem; font-size: 0.9rem; font-weight: 500;
      font-family: 'DM Sans', sans-serif; color: white; background: var(--accent);
      border: none; border-radius: 10px; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 0.5rem;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.99); }
    .page-footer { text-align: center; margin-top: 1.5rem; font-size: 0.72rem; color: var(--ink-muted); opacity: 0.7; line-height: 1.8; }
    .page-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .page-footer a:hover { text-decoration: underline; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
        <path d="M8 12h8M12 8v8"/>
      </svg>
    </div>
    <h1>DermWiki</h1>
    <p>Comunidade Médica · Dermatologia</p>
  </div>
  <div class="card">
    <p class="card-title">Introduz a password de acesso</p>
    <div id="msg" class="message"></div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" autofocus/>
    </div>
    <button class="btn" onclick="handleAccess()">Entrar</button>
  </div>
  <div class="page-footer">
    Plataforma reservada a profissionais de saúde<br>
    Para problemas técnicos contactar <a href="mailto:jonubaso@gmail.com">jonubaso@gmail.com</a>
  </div>
</div>
<script>
  const PASSWORD   = 'Derm2025!';
  const NOTION_URL = 'https://dermwiki.notion.site/?v=1ec579234891818e8138000ca11a24ab';

  function handleAccess() {
    const val = document.getElementById('password').value;
    const msg = document.getElementById('msg');
    if (val === PASSWORD) {
      msg.className = 'message success';
      msg.textContent = 'Acesso confirmado! A redirecionar...';
      setTimeout(() => window.location.href = NOTION_URL, 800);
    } else {
      msg.className = 'message error';
      msg.textContent = 'Password incorreta. Tenta novamente.';
    }
  }

  document.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAccess(); });
</script>
</body>
</html>
